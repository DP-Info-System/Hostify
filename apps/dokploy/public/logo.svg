<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .server-layer { fill: black; }
    .gear-outer { fill: black; }
    @media (prefers-color-scheme: dark) {
      .server-layer { fill: white; }
      .gear-outer { fill: white; }
    }
  </style>
  <!-- Server Stack -->
  <rect class="server-layer" x="8" y="20" width="48" height="8" rx="2" />
  <rect class="server-layer" x="8" y="32" width="48" height="8" rx="2" />
  <rect class="server-layer" x="8" y="44" width="48" height="8" rx="2" />

  <!-- Indicators -->
  <circle cx="14" cy="24" r="1.5" fill="white"/>
  <circle cx="18" cy="24" r="1.5" fill="white"/>
  <circle cx="14" cy="36" r="1.5" fill="white"/>
  <circle cx="18" cy="36" r="1.5" fill="white"/>
  <circle cx="14" cy="48" r="1.5" fill="white"/>
  <circle cx="18" cy="48" r="1.5" fill="white"/>

  <!-- Gear (Top Center) -->
  <g transform="translate(32,12)">
    <circle class="gear-outer" r="6" />
    <circle r="3" fill="white"/>
  </g>
</svg>
