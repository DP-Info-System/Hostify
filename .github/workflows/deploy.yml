name: Hostify Extended Builds

on:
  push:
    branches: [main, canary]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: dp-info-system

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [cloud, schedule, server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag and version
        id: meta
        run: |
          VERSION=$(jq -r .version apps/dokploy/package.json)
          IMAGE_PATH="${{ env.REGISTRY }}/${{ env.ORG }}/hostify-${{ matrix.service }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tags=${IMAGE_PATH}:latest,${IMAGE_PATH}:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_PATH}:canary" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_UMAMI_HOST=${{ secrets.NEXT_PUBLIC_UMAMI_HOST }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
