name: Generate and Sync OpenAPI

on:
  push:
    branches:
      - canary
      - main
    paths:
      - 'apps/dokploy/server/api/routers/**'
      - 'packages/server/src/services/**'
      - 'packages/server/src/db/schema/**'

  workflow_dispatch:

jobs:
  generate-and-commit:
    name: Generate OpenAPI and commit to Dokploy repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dokploy repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI specification
        run: |
          pnpm generate:openapi
          
          # Verifica que se generó correctamente
          if [ ! -f openapi.json ]; then
            echo "❌ openapi.json not found"
            exit 1
          fi
          
          echo "✅ OpenAPI specification generated successfully"

      - name: Sync to website repository
        run: |
          # Determine which token to use
          if [ -z "${{ secrets.DOCS_SYNC_TOKEN }}" ]; then
            echo "ℹ️  DOCS_SYNC_TOKEN not configured, falling back to GITHUB_TOKEN"
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
          else
            TOKEN="${{ secrets.DOCS_SYNC_TOKEN }}"
          fi
          
          # Clone the website repository
          git clone https://x-access-token:${TOKEN}@github.com/dokploy/website.git website-repo || {
            echo "⚠️  Failed to clone website repository. This may be expected if:"
            echo "   - The repository is private and requires DOCS_SYNC_TOKEN"
            echo "   - Network connectivity issues"
            echo "   - Token permissions insufficient"
            echo "To enable this step, configure DOCS_SYNC_TOKEN secret in GitHub repository settings"
            echo "Continuing without syncing to website..."
            exit 0
          }
          
          cd website-repo
          
          # Copy openapi.json to website (overwrite)
          mkdir -p apps/docs/public
          cp -f ../openapi.json apps/docs/public/openapi.json
          
          # Configure git
          git config user.name "Dokploy Bot"
          git config user.email "bot@dokploy.com"
          
          # Add and commit
          git add apps/docs/public/openapi.json
          git commit -m "chore: sync OpenAPI specification [skip ci]" \
            -m "Source: ${{ github.repository }}@${{ github.sha }}" \
            -m "Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --allow-empty
          
          git push
          
          echo "✅ OpenAPI synced to website successfully"

